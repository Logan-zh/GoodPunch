services:
  app:
    build:
      context: .
    container_name: goodpunch_app
    restart: unless-stopped
    volumes:
      - app_storage:/var/www/html/storage
      - sqlite_data:/var/www/html/database
    networks:
      - goodpunch

  nginx:
    image: nginx:stable-alpine
    container_name: goodpunch_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - goodpunch

volumes:
  app_storage:
  sqlite_data:

networks:
  goodpunch:
    driver: bridge
